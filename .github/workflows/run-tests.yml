name: Build and Run C++ Unit Tests

on:
  push:
    branches: ["master"]
      #- main # Adjust based on your workflow
  pull_request:
    branches: ["master"]
      #- main

jobs:
  build-and-test:
    runs-on: windows-latest # Use Windows for Visual Studio compatibility

    steps:
    # Step 1: Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Visual Studio environment
    - name: Set up Visual Studio
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64 # Architecture for your build

    # Step 3: Install vcpkg and Google Test on the CI runner
    - name: Bootstrap vcpkg and install GTest
      run: |
        git clone https://github.com/microsoft/vcpkg.git vcpkg
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg.exe install gtest:x64-windows

    # Step 4: Configure and build with CMake using vcpkg
    - name: Configure and build
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=%CD%\vcpkg\scripts\buildsystems\vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
        cmake --build build --config Debug

    # Step 5: Run the unit tests
    - name: Run unit tests
      run: |
        cmake --build build --config Debug --target RUN_TESTS
        ctest --test-dir build -C Debug --output-on-failure

